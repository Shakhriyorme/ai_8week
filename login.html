<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI/ML Tracker — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;--bg2:#0f0f14;--bg3:#16161e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e4e2db;--muted:#5e5c56;
  --yellow:#f9c74f;--yellow2:#ffd166;--yellow3:#ffe599;
  --blue:#2c5fbe;--blue2:#3a74e0;
  --teal:#14b8a6;--amber:#f59e0b;
  --red:#ef4444;--green:#22c55e;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}

/* ---- BACKGROUND ---- */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 60% at 20% 60%, rgba(249,199,79,.07) 0%, transparent 70%),
             radial-gradient(ellipse 50% 50% at 80% 20%, rgba(44,95,190,.09) 0%, transparent 60%);
}
.grid-bg{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(249,199,79,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(249,199,79,.015) 1px, transparent 1px);
  background-size:48px 48px;
}

/* ---- LAYOUT ---- */
.wrap{
  position:relative;z-index:1;
  height:100vh;
  display:grid;
  grid-template-columns:1fr 440px;
  overflow:hidden;
}
@media(max-width:900px){
  html,body{overflow:auto}
  .wrap{height:auto;grid-template-columns:1fr;grid-template-rows:auto 1fr}
}

/* ---- LEFT PANEL (Kevin) ---- */
.left-panel{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 28px;
  position:relative;
  gap:0;
}
.minion-wrap{
  position:relative;
  width:195px;
  flex-shrink:0;
  animation:float 3.5s ease-in-out infinite;
}
/* mix-blend-mode:screen makes the black PNG background transparent */
.minion-wrap img{
  width:100%;display:block;
  mix-blend-mode:screen;
  filter:drop-shadow(0 16px 32px rgba(249,199,79,.45))
         drop-shadow(0 0 40px rgba(249,199,79,.2));
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.minion-shadow{
  width:90px;height:14px;
  background:rgba(249,199,79,.18);
  border-radius:50%;
  margin:0 auto;
  margin-top:-6px;
  animation:shadow-pulse 3.5s ease-in-out infinite;
  filter:blur(7px);
}
@keyframes shadow-pulse{
  0%,100%{transform:scaleX(1);opacity:.5}
  50%{transform:scaleX(.65);opacity:.22}
}

.tagline{
  margin-top:14px;
  text-align:center;
  max-width:280px;
}
.tagline h2{
  font-size:18px;font-weight:800;
  color:var(--yellow);
  line-height:1.3;
  letter-spacing:-.02em;
}
.tagline p{
  margin-top:6px;font-size:12px;
  color:var(--muted);line-height:1.55;
}

.badge-row{
  margin-top:14px;
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
}
.badge{
  background:rgba(249,199,79,.08);
  border:1px solid rgba(249,199,79,.18);
  color:var(--yellow);
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:600;
  padding:3px 8px;border-radius:4px;
  letter-spacing:.05em;
}

@media(max-width:900px){
  .left-panel{padding:24px 20px 12px}
  .minion-wrap{width:130px}
  .tagline h2{font-size:15px}
}

/* ---- RIGHT PANEL (Form) ---- */
.right-panel{
  display:flex;align-items:center;justify-content:center;
  padding:20px 22px;
  border-left:1px solid var(--border);
  background:var(--bg2);
  overflow-y:auto;
}

.auth-card{width:100%;max-width:380px}

.auth-logo{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
.auth-logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--yellow),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#000;
}
.auth-logo-text{font-weight:800;font-size:15px;letter-spacing:-.02em}
.auth-logo-text span{color:var(--yellow)}

/* Tabs */
.tabs{
  display:flex;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;
  padding:3px;gap:3px;margin-bottom:18px;
}
.tab-btn{
  flex:1;padding:8px;border:none;background:none;
  color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  border-radius:6px;transition:all .2s;
}
.tab-btn.active{
  background:var(--yellow);color:#000;
}

/* Form */
.form-section{display:none}
.form-section.active{display:block}

.form-group{margin-bottom:11px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
label{
  display:block;font-size:10px;font-weight:700;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:5px;
  font-family:'JetBrains Mono',monospace;
}
input{
  width:100%;padding:9px 12px;
  border:1px solid var(--border2);
  border-radius:7px;background:var(--bg3);
  color:var(--text);font-family:'Outfit',sans-serif;
  font-size:13px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
input:focus{
  border-color:var(--yellow);
  box-shadow:0 0 0 3px rgba(249,199,79,.1);
}
input::placeholder{color:var(--muted)}

.btn-submit{
  width:100%;padding:11px;
  background:var(--yellow);color:#000;
  border:none;border-radius:7px;
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:800;
  cursor:pointer;transition:all .2s;
  margin-top:4px;letter-spacing:.01em;
}
.btn-submit:hover{background:var(--yellow2);transform:translateY(-1px)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-box{
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.2);
  color:#fca5a5;font-size:11px;
  padding:8px 12px;border-radius:6px;
  margin-bottom:10px;line-height:1.5;
  display:none;
}
.error-box.show{display:block}

.success-box{
  background:rgba(34,197,94,.08);
  border:1px solid rgba(34,197,94,.2);
  color:#86efac;font-size:11px;
  padding:8px 12px;border-radius:6px;
  margin-bottom:10px;line-height:1.5;
  display:none;
}
.success-box.show{display:block}

.hint{
  text-align:center;font-size:10px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;margin-top:12px;
}

/* Loading spinner */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(0,0,0,.3);
  border-top-color:#000;border-radius:50%;
  animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-bg"></div>

<div class="wrap">

  <!-- LEFT: Minion -->
  <div class="left-panel">
    <div class="minion-wrap">
      <img src="minion_clean_transparent.png" alt="Minion" style="width:100%;display:block;object-fit:contain">
    </div>
    <div class="minion-shadow"></div>

    <div class="tagline">
      <h2>Please Sign In<br>or Sign Up 🍌</h2>
      <p>Your personal AI/ML Tracker. Your progress, your projects, your cabinet.</p>
    </div>

    <div class="badge-row">
      <span class="badge">8-WEEK MISSION</span>
      <span class="badge">4 PROJECTS</span>
      <span class="badge">AI MENTOR</span>
    </div>
  </div>

  <!-- RIGHT: Auth Form -->
  <div class="right-panel">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">M</div>
        <div class="auth-logo-text"><span>AI</span>/ML Tracker</div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Error / Success -->
      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox"></div>

      <!-- SIGN IN FORM -->
      <div class="form-section active" id="signinForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="siUsername" placeholder="username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-submit" id="signinBtn" onclick="handleSignIn()">Sign In →</button>
        <div class="hint">Don't have an account? Click <strong>Sign Up</strong> above.</div>
      </div>

      <!-- SIGN UP FORM -->
      <div class="form-section" id="signupForm">
        <div class="form-row">
          <div>
            <label>Full Name</label>
            <input type="text" id="suName" placeholder="Shahriyor" autocomplete="name">
          </div>
          <div>
            <label>Age</label>
            <input type="number" id="suAge" placeholder="20" min="10" max="60">
          </div>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="suUsername" placeholder="shahriyor_dev" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <input type="password" id="suPassword" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="suConfirm" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="signupBtn" onclick="handleSignUp()">Create Account →</button>
        <div class="hint">Already have an account? Click <strong>Sign In</strong> above.</div>
      </div>

    </div>
  </div>
</div>

<script>
// ---- Check if already logged in ----
(async function() {
  if (window.Auth) {
    try {
      const session = Auth.getSession();
      if (session && session.id) {
        // Verify with Supabase
        const client = Auth.client();
        if (client) {
          const { data } = await client.auth.getUser();
          if (data?.user) {
            window.location.href = 'index.html';
            return;
          }
        }
      }
    } catch(e) {}
  }
})();

// ---- Tab switching ----
function switchTab(tab) {
  document.getElementById('signinForm').classList.toggle('active', tab === 'signin');
  document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'signin') || (i === 1 && tab === 'signup'));
  });
  hideMessages();
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
  document.getElementById('successBox').classList.remove('show');
}

function showSuccess(msg) {
  const box = document.getElementById('successBox');
  box.textContent = msg;
  box.classList.add('show');
  document.getElementById('errorBox').classList.remove('show');
}

function hideMessages() {
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('successBox').classList.remove('show');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  if (loading) {
    btn.dataset.original = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Kuting...';
  } else {
    btn.innerHTML = btn.dataset.original || btn.innerHTML;
  }
}

// ---- Sign In ----
async function handleSignIn() {
  const username = document.getElementById('siUsername').value.trim();
  const password = document.getElementById('siPassword').value;

  if (!username || !password) {
    showError('Please enter your username and password.');
    return;
  }

  setLoading('signinBtn', true);
  hideMessages();

  try {
    await Auth.signIn(username, password);
    showSuccess('Welcome back! Redirecting...');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  } catch (err) {
    showError(err.message || 'Login failed. Please try again.');
    setLoading('signinBtn', false);
  }
}

// ---- Sign Up ----
async function handleSignUp() {
  const name = document.getElementById('suName').value.trim();
  const age = document.getElementById('suAge').value.trim();
  const username = document.getElementById('suUsername').value.trim();
  const password = document.getElementById('suPassword').value;
  const confirm = document.getElementById('suConfirm').value;

  if (!name || !username || !password || !confirm) {
    showError('Please fill in all fields.');
    return;
  }
  if (!/^[a-z0-9_]+$/i.test(username)) {
    showError('Username can only contain letters, numbers, and underscores.');
    return;
  }
  if (password.length < 6) {
    showError('Password must be at least 6 characters.');
    return;
  }
  if (password !== confirm) {
    showError('Passwords do not match.');
    return;
  }

  setLoading('signupBtn', true);
  hideMessages();

  try {
    await Auth.signUp(username, password, name, age);
    showSuccess('Account created successfully! Redirecting...');
    setTimeout(() => { window.location.href = 'index.html'; }, 900);
  } catch (err) {
    showError(err.message || 'Sign up failed. Please try again.');
    setLoading('signupBtn', false);
  }
}

// ---- Enter key support ----
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const signinActive = document.getElementById('signinForm').classList.contains('active');
    if (signinActive) handleSignIn();
    else handleSignUp();
  }
});
</script>
</body>
</html>
